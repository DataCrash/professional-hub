name: Professional Hub Data Refresh

on:
  schedule:
    - cron: '0 2 * * *' # 23:00 BRT
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh GitHub metrics
        env:
          GITHUB_USERNAME: datacrash
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run data:refresh

      - name: Commit refreshed metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(data): refresh github metrics'
          file_pattern: public/data/github-metrics.json
